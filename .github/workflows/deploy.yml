name: deploy ecommerceweb

on:
  push:
    branches: [master]

jobs:
  create-deployment:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v2

      # Step 2: Set up Docker
      - name: Set up Docker
        uses: docker/setup-buildx-action@v1

      # Step 3: Build the Docker image
      - name: Build Docker image
        run: |
          docker build -t ${DOCKER_USERNAME}/ecommerceweb:latest .
        env:
          DOCKER_BUILDKIT: 1

      # Step 4: Authenticate Docker Hub
      - name: Authenticate Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 5: Push Docker image to Docker Hub
      - name: Push Docker image
        run: |
          docker push ${DOCKER_USERNAME}/ecommerceweb:latest

  deploy-main:
    needs: create-deployment
    runs-on: ubuntu-latest

    steps:
      # Step 6: SSH into server and deploy
      - name: SSH into server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST_SERVER }}
          username: ${{ secrets.HOSTNAME }}
          password: ${{ secrets.HOST_PASSWORD }}
          script: |
            echo "Deploying ecommerceweb on server..."

            # Pull the latest image
            docker pull ${DOCKER_USERNAME}/ecommerceweb:latest

            # Stop and remove the old container
            docker stop ecommerceweb || true
            docker rm ecommerceweb || true

            # Run the new container on port 3001
            docker run -d --name ecommerceweb -p 3001:3001 ${DOCKER_USERNAME}/ecommerceweb:latest

            echo "ecommerceweb deployed successfully!"
